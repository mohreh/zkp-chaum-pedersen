syntax = "proto3";
package zkp_auth;

/*
 * Phase 1: Registration
 * The prover registers with the verifier (server) by providing their identity
 * and their public commitment to a secret value 'x'.
 * * public_value_1 (y1) = generator_1 ^ secret_value mod prime_modulus
 * public_value_2 (y2) = generator_2 ^ secret_value mod prime_modulus
 */
message RegisterRequest {
  string user = 1;
  bytes public_value_1 = 2;
  bytes public_value_2 = 3;
}

message RegisterResponse {}

/*
 * Phase 2: Commitment & Challenge
 * The prover initiates an authentication session by generating a random nonce 'k'
 * and computing two commitments.
 * * commitment_1 (r1) = generator_1 ^ random_nonce mod prime_modulus
 * commitment_2 (r2) = generator_2 ^ random_nonce mod prime_modulus
 * * The verifier receives these commitments and returns a cryptographically
 * secure random challenge 'c', along with a unique authentication session ID.
 */
message CreateAuthenticationChallengeRequest {
  string user = 1;
  bytes commitment_1 = 2;
  bytes commitment_2 = 3;
}

message CreateAuthenticationChallengeResponse {
  string auth_id = 1;
  bytes challenge = 2;
}

/*
 * Phase 3: Response & Verification
 * The prover calculates the response 's' to the challenge using their secret value 'x'.
 * * response (s) = (random_nonce - challenge * secret_value) mod subgroup_order
 * * The verifier evaluates the proof using the stored public values and commitments.
 * If mathematically valid, a session ID (or JWT token) is returned.
 */
message VerifyAuthenticationRequest {
  string auth_id = 1;
  bytes response = 2;
}

message VerifyAuthenticationResponse {
  string session_id = 1;
}

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  rpc CreateAuthenticationChallenge(CreateAuthenticationChallengeRequest) returns (CreateAuthenticationChallengeResponse) {}
  rpc VerifyAuthentication(VerifyAuthenticationRequest) returns (VerifyAuthenticationResponse) {}
}
